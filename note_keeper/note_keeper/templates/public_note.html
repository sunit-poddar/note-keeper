{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ note.title }} — NoteKeeper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
  <script>
    (function() {
      var t = localStorage.getItem('nk-theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <script type="importmap">{"imports": {"marked": "https://esm.sh/marked@12"}}</script>
</head>
<body class="public-body">
<div id="public-note-page">
  <header id="public-note-header">
    <a href="/" class="brand">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      NoteKeeper
    </a>
    <h1 id="public-note-title">{{ note.title }}</h1>
  </header>
  <div id="public-note-content"></div>
</div>
<script id="note-raw" type="application/json">{{ note.text|escapejs }}</script>
<script type="module">
  import { marked } from 'marked';
  const raw = document.getElementById('note-raw').textContent;
  document.getElementById('public-note-content').innerHTML = marked.parse(raw);
</script>
</body>
</html>
